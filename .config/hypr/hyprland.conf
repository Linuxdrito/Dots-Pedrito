monitor = eDP-1, 1920x1080@48, 0x0, 1

$terminal = footclient -o colors-dark.foreground=00ffff
$menu = wofi --show drun --style ~/.config/wofi/style.css

exec-once = waybar -c ~/.config/waybar/config-hypr.jsonc -s ~/.config/waybar/css/style2.css &
exec-once = swww-daemon &
exec-once = foot --server &
exec-once = /usr/libexec/xdg-desktop-portal-hyprland &
exec-once = pulseaudio &
exec-once = swww img /home/pedrito/Descargas/Lain-wall.gif --transition-fps 15

#env = XCURSOR_THEME,Marci-Crystal 
env = XCURSOR_SIZE,80
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct:qt6ct
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_NONREPARENTING,1
env = WEBKIT_DISABLE_COMPOSITING_MODE,1
env = WEBKIT_FORCE_SANDBOX,0
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    col.active_border = rgba(00ffffee) rgba(0088ffee) 45deg
    col.inactive_border = rgba(555555ff)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

cursor {
    inactive_timeout = 1
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = layers, 1, 5, quick, slide
    animation = global, 1, 4, default
    animation = border, 1, 5, easeOutQuint
    animation = windows, 1, 4, easeOutQuint
    animation = windowsIn, 1, 4, easeOutQuint, popin 87%
    animation = windowsOut, 1, 2, quick, popin 87%
    animation = fade, 1, 3, quick
    animation = workspaces, 1, 6, easeOutQuint, slide
    animation = workspacesIn, 1, 6, easeOutQuint, slide   
    animation = workspacesOut, 1, 6, easeOutQuint, slide

}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


input {
    kb_layout = us
    repeat_delay = 250
    repeat_rate = 35

    follow_mouse = 1
    sensitivity = 0


    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe = false
}



$mainMod = ALT

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, K, exec, kitty
bind = $mainMod, B, exec, badwolf
bind = $mainMod SHIFT, B, exec, footclient btop
bind = $mainMod SHIFT, N, exec, footclient ncmpcpp
bind = $mainMod, C, exec, footclient cava
bind = $mainMod SHIFT, L, exec, firefox
bind = $mainMod, T, exec, /opt/thorium-browser/thorium --ozone-platform=wayland
bind = $mainMod SHIFT, E, exec, wlogout -l ~/.config/wlogout/layout2
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, N, exec, brightnessctl set 1
bind = $mainMod, Q, killactive
bind = $mainMod, H, exec, footclient fetch
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, V, focusurgentorlast
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
binde = $mainMod, bracketright, exec, brightnessctl set 1%+
binde = $mainMod, bracketleft,  exec, brightnessctl set 1%-
bind = $mainMod SHIFT, up, exec, mpc next
bind = $mainMod SHIFT, down, exec, mpc prev
bind = $mainMod SHIFT, left, exec, mpc seek -5
bind = $mainMod SHIFT, right, exec, mpc seek +5

bind = SUPER ALT, S, exec, pkill orca || orca
bind = , Print, exec, grim /tmp/caps/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod SHIFT, K, exec, hyprctl clients -j | jq -r '.[].address' | xargs -I {} hyprctl dispatch closewindow address:{}

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d
bind = $mainMod CTRL, H,     movewindow, l
bind = $mainMod CTRL, J,     movewindow, d
bind = $mainMod CTRL, K,     movewindow, u
bind = $mainMod CTRL, L,     movewindow, r

bind = $mainMod, Page_Down, workspace, e+1
bind = $mainMod, Page_Up,   workspace, e-1
bind = $mainMod, U,         workspace, e+1
bind = $mainMod, I,         workspace, e-1

bind = $mainMod CTRL, Page_Down, movetoworkspace, e+1
bind = $mainMod CTRL, Page_Up,   movetoworkspace, e-1
bind = $mainMod CTRL, U,         movetoworkspace, e+1
bind = $mainMod CTRL, I,         movetoworkspace, e-1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, minus, resizeactive, -80 0
bind = $mainMod, equal, resizeactive, 80 0
bind = $mainMod SHIFT, minus, resizeactive, 0 -80
bind = $mainMod SHIFT, equal, resizeactive, 0 80

bindel = , XF86AudioRaiseVolume, exec, amixer set Master 5%+
bindel = , XF86AudioLowerVolume, exec, amixer set Master 5%-
bindel = , XF86AudioMute,        exec, amixer set Master toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

bindel = , XF86MonBrightnessUp,   exec, brightnessctl --class=backlight set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl --class=backlight set 10%-


windowrule = opacity 0.8 0.8, class:^(footclient)$
windowrule = opacity 0.8 0.8, class:^(kitty)$
windowrule = opacity 0.8 0.8, class:^(Alacritty)$
windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
layerrule = animation slide bottom, wofi
