monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:48,x:0,y:10

env = XCURSOR_SIZE,80
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct:qt6ct
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_NONREPARENTING,1
env = WEBKIT_DISABLE_COMPOSITING_MODE,1
env = WEBKIT_FORCE_SANDBOX,0
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_SESSION_TYPE,wayland


exec-once= waybar -c ~/.config/waybar/config-mango.jsonc -s ~/.config/waybar/css/style2.css &
exec-once= swaybg -i ~/Descargas/lainojos.png &
#exec-once= awww-daemon &
#exec-once= swww img ~/Descargas/Lain-wall.gif &
exec-once= dbus-update-activation --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE &
exec-once= pipewire &
exec-once= pipewire-pulse &
exec-once= wireplumber & 
exec-once= kitty --single-instance -T kitty-daemon &

focuscolor=0x00ffffee
borderpx=2
gappih=8
gappiv=1
gappoh=4
gappov=4
border_radius=8
focused_opacity=0.8
unfocused_opacity=0.8
animations=1
layer_animations=1
hotarea_size=5
overviewgappo=3
overviewgappi=1

animation_duration_move=600
animation_duration_open=600
animation_duration_tag=400
animation_duration_close=400
animation_duration_focus=0

animation_curve_open=0.05,0.9,0.1,1.2
animation_curve_close=0.05,0.9,0.1,1.2
animation_curve_move=0.05,0.9,0.1,1.1

#windowrule=isnamedscratchpad:1,isopensilent:1,width:1280,height:800,title:kitty-daemon
windowrule=tags:9,isopensilent:1,title:kitty-daemon
windowrule=focused_opacity:1,unfocused_opacity:1,appid:thorium-browser
windowrule=focused_opacity:1,unfocused_opacity:1,appid:thorium-web.whatsapp.com__-Default
windowrule=focused_opacity:1,unfocused_opacity:1,appid:Apache NetBeans IDE 25
windowrule=focused_opacity:1,unfocused_opacity:1,appid:blender
windowrule=focused_opacity:1,unfocused_opacity:1,appid:libreoffice-startcenter
windowrule=focused_opacity:1,unfocused_opacity:1,isfloating:1,appid:Clientes
layerrule=animation_type_open:slide,layer_name:wofi
layerrule=animation_type_open:slide,layer_name:wlogout

mousebind=alt,btn_left,moveresize,curmove
mousebind=alt,btn_right,moveresize,curresize

bind=alt+shift,q,spawn,sh -c "pkill wireplumber && pkill pipewire-pulse && pipewire  && mmsg -d quit"
bind=alt+shift,r,reload_config
bind=alt,q,killclient
bind=alt,n,spawn,brightnessctl set 1
bind=alt,Return,spawn,kitty --single-instance -T Ola
bind=alt,d,spawn,wofi --show drun --style ~/.config/wofi/style.css
bind=alt,j,spawn,kitty --single-instance -T Ola fetchlains
bind=alt,h,spawn,foot fetchlains
bind=alt,v,togglefloating
bind=alt+shift,f,togglefullscreen
bind=alt,e,spawn,wlogout -l ~/.config/wlogout/layout2
bind=alt,t,spawn,/opt/thorium-browser/thorium --ozone-platform=wayland --use-gl=angle --use-angle=gl --enable-features=VaapiVideoDecoder --ignore-gpu-blocklist --disable-features=UseChromeOSDirectVideoDecoder --process-per-site --disable-background-networking
bind=NONE,Print,spawn,grim /tmp/caps/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png

bind=alt,l,switch_layout
bind=alt,o,toggleoverview
bind=alt,Tab,toggleoverlay
bind=alt,i,minimized
bind=alt+shift,i,restore_minimized

bind=alt,Tab,focusstack,next
bind=alt,Left,focusdir,left
bind=alt,Right,focusdir,right
bind=alt,Up,focusdir,up
bind=alt,Down,focusdir,Down

bind=alt+SHIFT,Tab,exchange_stack_client,next
bind=alt+SHIFT,Left,exchange_client,left
bind=alt+SHIFT,Right,exchange_client,right
bind=alt+SHIFT,Up,exchange_client,up
bind=alt+SHIFT,Down,exchange_client,down

bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

bind=alt,1,view,1,0
bind=alt,2,view,2,0
bind=alt,3,view,3,0
bind=alt,4,view,4,0
bind=alt,5,view,5,0
bind=alt,6,view,6,0
bind=alt,7,view,7,0
bind=alt,8,view,8,0
bind=alt,9,view,9,0
bind=alt,0,view,0,0

bind=alt+CTRL,0,toggletag,0
bind=alt+CTRL,1,toggletag,1
bind=alt+CTRL,2,toggletag,2
bind=alt+CTRL,3,toggletag,3
bind=alt+CTRL,4,toggletag,4
bind=alt+CTRL,5,toggletag,5
bind=alt+CTRL,6,toggletag,6
bind=alt+CTRL,7,toggletag,7
bind=alt+CTRL,8,toggletag,8
bind=alt+CTRL,9,toggletag,9

bind=alt+SHIFT,1,tag,1,0
bind=alt+SHIFT,2,tag,2,0
bind=alt+SHIFT,3,tag,3,0
bind=alt+SHIFT,4,tag,4,0
bind=alt+SHIFT,5,tag,5,0
bind=alt+SHIFT,6,tag,6,0
bind=alt+SHIFT,7,tag,7,0
bind=alt+SHIFT,8,tag,8,0
bind=alt+SHIFT,9,tag,9,0
bind=alt+SHIFT,0,tag,0,0

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +5%
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 5%-

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle


